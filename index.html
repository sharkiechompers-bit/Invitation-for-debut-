<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dana’s 18th Birthday Invitation</title>

  <style>
    @font-face {
      font-family: "Xiomara";
      src: url("./Xiomara-Script.ttf") format("truetype");
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background: url('royal-palace-bg.jpg') no-repeat center center fixed;
      background-size: 100% 100%; 
      font-family: "Xiomara", serif;
      color: #3d3012;
      overflow-x: hidden;
    }

    .sparkles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: url('sparkles.png') repeat;
      animation: sparkleMove 15s linear infinite;
      opacity: 0.4;
      pointer-events: none;
      z-index: 10;
    }

    @keyframes sparkleMove {
      from { background-position: 0 0; }
      to { background-position: 1000px 1000px; }
    }

    .container {
      width: 85%;
      max-width: 500px;
      margin-top: 12vh;
      text-align: center;
      position: relative;
      z-index: 2;
      padding-bottom: 100px; /* Extra space for scrolling */
    }

    .envelope {
      width: 180px;
      height: 120px;
      background: url('elegant-envelope.png') no-repeat center/contain;
      cursor: pointer;
      margin: 40px auto 10px auto;
      transition: transform 0.8s ease-out, opacity 0.5s;
    }

    .envelope.open {
      transform: translateY(-50px) scale(0.5);
      opacity: 0;
    }

    .invite-text {
      font-size: 1.8rem;
      color: #8a702a;
      margin-top: 0;
      animation: pulse 2s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
    }

    .invitation {
      display: none;
      opacity: 0;
      transition: opacity 1.5s ease-in;
    }

    .profile-img {
      width: 220px;
      height: 220px;
      object-fit: cover;
      border-radius: 50%;
      border: 4px solid #d4af37;
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.6);
      margin-bottom: 20px;
    }

    /* Styling for Venue and Attire Images */
    .info-img {
      width: 100%;
      max-width: 400px;
      border-radius: 12px;
      border: 2px solid #d4af37;
      margin-top: 25px;
      box-shadow: 0 8px 15px rgba(0,0,0,0.2);
    }

    .line {
      overflow: hidden;
      white-space: nowrap;
      width: 0;
      margin: 12px auto;
      font-size: 1.3rem;
      border-right: 2px solid transparent;
      animation: typing 3s steps(40, end) forwards;
    }

    @keyframes typing {
      from { width: 0; }
      to { width: 100%; }
    }

    /* Animation Timing */
    .line:nth-child(2) { animation-delay: 1.5s; } /* Dana is turning... */
    .line:nth-child(3) { animation-delay: 4.5s; } /* We happily invite... */
    .line:nth-child(4) { animation-delay: 7.5s; } /* May 19... */
    .line:nth-child(5) { animation-delay: 10.5s; } /* at Florenceville... */
    .line:nth-child(6) { animation-delay: 13.5s; } /* Scroll hint... */

    h1.line { font-size: 2.2rem; margin-bottom: 20px; }

    .scroll-hint {
        font-style: italic;
        margin-top: 40px;
        font-size: 1.1rem;
        color: #8a702a;
    }
  </style>
</head>

<body>

  <audio id="bg-music" loop>
    <source src="million-dreams.mp3" type="audio/mpeg">
  </audio>

  <div class="sparkles"></div>

  <div class="container">
    <div id="intro-section">
      <div class="envelope" id="envelope"></div>
      <p class="invite-text" id="invite-text">You're invited! Click me</p>
    </div>

    <div id="invitation" class="invitation">
      <img src="dana-photo.png" alt="Dana" class="profile-img">

      <h1 class="line">Dana is turning 18!!</h1>
      <p class="line">We happily invite you to her party!</p>
      <p class="line">May 19, 2026, 5:00pm</p>
      <p class="line">at Florenceville Private Resort & Events Place General Trias Cavite</p>
      
      <p class="line scroll-hint">Scroll down for details ↓</p>
      
      <!-- Venue Section -->
      <img src="./location-venue.png" alt="Venue" class="info-img">
      
      <!-- Attire Section -->
      <p style="margin-top: 50px; font-size: 1.5rem;">Dress Code</p>
      <img src="./attire-guide.png" alt="Attire Guide" class="info-img">
    </div>
  </div>

  <script>
    const envelope = document.getElementById("envelope");
    const inviteText = document.getElementById("invite-text");
    const invitation = document.getElementById("invitation");
    const music = document.getElementById("bg-music");

    document.addEventListener("click", () => {
      music.play().catch(e => console.log("Music blocked"));
    }, { once: true });

    envelope.addEventListener("click", () => {
      envelope.classList.add("open");
      inviteText.style.opacity = "0"; 
      
      setTimeout(() => {
        document.getElementById("intro-section").style.display = "none";
        invitation.style.display = "block";
        setTimeout(() => { 
            invitation.style.opacity = "1";
            document.body.style.overflowY = "auto";
        }, 100);
      }, 600);
    });
  </script>

</body>
</html>
