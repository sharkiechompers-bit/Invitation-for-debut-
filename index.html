<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dana’s 18th Birthday Invitation</title>

  <style>
    /* 1. UPDATED FONT (Matching your filename) */
    @font-face {
      font-family: "Brush Script MT";
      src: url("./BRUSHSCI.TTF") format("truetype");
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background: url('red-roses-bg.jpg') no-repeat center center fixed;
      background-size: cover; 
      font-family: "Brush Script MT", cursive; /* Updated family */
      color: #ffffff;
      overflow-x: hidden;
    }

    /* Falling Petals */
    .petals {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: url('petals.png') repeat;
      animation: petalFall 25s linear infinite;
      opacity: 0.3;
      filter: brightness(1.5);
      pointer-events: none;
      z-index: 10;
    }

    @keyframes petalFall {
      from { background-position: 0 0; }
      to { background-position: 500px 1000px; }
    }

    .container {
      width: 90%;
      max-width: 500px;
      margin-top: 10vh;
      text-align: center;
      position: relative;
      z-index: 2;
      padding-bottom: 100px;
    }

    /* 2. ADDED FADE-IN ANIMATION FOR INTRO */
    #intro-section {
      animation: fadeInIntro 2s ease-out forwards;
    }

    @keyframes fadeInIntro {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 3. BIGGER ENVELOPE */
    .envelope {
      width: 280px;  /* Made even bigger for impact */
      height: 200px;
      background: url('red-env.png') no-repeat center/contain;
      cursor: pointer;
      margin: 20px auto; 
      transition: transform 0.8s ease-out, opacity 0.5s;
    }

    .envelope.open {
      transform: translateY(-50px) scale(0.5);
      opacity: 0;
    }

    .invite-text {
      font-size: 2rem; /* Slightly larger text */
      color: #ffffff;
      margin-bottom: 10px;
      animation: pulse 2s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .invitation {
      display: none;
      opacity: 0;
      transition: opacity 1.5s ease-in;
    }

    .profile-img {
      width: 220px;
      height: 220px;
      object-fit: cover; 
      object-position: center 10%;
      border-radius: 50%;
      border: 4px solid #ffffff;
    }

    .info-img {
      width: 100%;
      max-width: 400px;
      border-radius: 12px;
      border: 2px solid #ffffff;
      margin-top: 25px;
      box-shadow: 0 8px 15px rgba(0,0,0,0.3);
    }

    .line {
      overflow: hidden;
      white-space: normal;
      width: 0;
      margin: 12px auto;
      font-size: 1.5rem;
      border-right: 2px solid transparent;
      animation: typing 3s steps(40, end) forwards;
    }

    @keyframes typing {
      from { width: 0; }
      to { width: 100%; }
    }

    .line:nth-child(2) { animation-delay: 1.5s; }
    .line:nth-child(3) { animation-delay: 4.5s; }
    .line:nth-child(4) { animation-delay: 7.5s; }
    .line:nth-child(5) { animation-delay: 10.5s; }

    h1.line { font-size: 2.5rem; margin-bottom: 20px; }
  </style>
</head>

<body>
  <audio id="bg-music" loop>
    <source src="million-dreams.mp3" type="audio/mpeg">
  </audio>

  <div class="petals"></div>

  <div class="container">
    <div id="intro-section">
      <!-- 4. TEXT IS NOW ABOVE THE ENVELOPE -->
      <p class="invite-text" id="invite-text">You're invited! Click me</p>
      <div class="envelope" id="envelope"></div>
    </div>

    <div id="invitation" class="invitation">
      <img src="dana-photo.jpg" alt="Dana" class="profile-img">

      <h1 class="line">Dana is turning 18!!</h1>
      <p class="line">We happily invite you to her party!</p>
      <p class="line">May 19, 2026, 5:00pm</p>
      <p class="line">at Florenceville Private Resort & Events Place <br> General Trias Cavite</p>
      
      <img src="location-venue.png" alt="Venue" class="info-img">
    </div>
  </div>

  <script>
    const envelope = document.getElementById("envelope");
    const invitation = document.getElementById("invitation");
    const music = document.getElementById("bg-music");

    // Play music on first click anywhere
    document.addEventListener("click", () => {
      music.play().catch(e => console.log("Music blocked by browser"));
    }, { once: true });

    envelope.addEventListener("click", () => {
      envelope.classList.add("open");
      setTimeout(() => {
        document.getElementById("intro-section").style.display = "none";
        invitation.style.display = "block";
        setTimeout(() => { 
            invitation.style.opacity = "1";
            document.body.style.overflowY = "auto";
        }, 100);
      }, 600);
    });
  </script>
</body>
</html>
