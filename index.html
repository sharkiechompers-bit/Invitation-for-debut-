<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dana’s 18th Birthday Invitation</title>

  <style>
    @font-face {
      font-family: "Brush Script MT";
      src: url("./BRUSHSCI.TTF") format("truetype");
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: url('red-roses-bg.png') no-repeat center center fixed;
      background-size: cover; 
      font-family: "Brush Script MT", cursive;
      color: #ffffff;
    }

    /* Falling Petals */
    .petals {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: url('petals.png') repeat;
      animation: petalFall 25s linear infinite;
      opacity: 0.3;
      z-index: 10;
      pointer-events: none;
    }

    @keyframes petalFall {
      from { background-position: 0 0; }
      to { background-position: 500px 1000px; }
    }

    .container {
      width: 90%;
      max-width: 500px;
      margin-top: 10vh;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .envelope {
      width: 280px;
      height: 200px;
      background: url('red-env.png') no-repeat center/contain;
      cursor: pointer;
      margin: 20px auto; 
      transition: transform 0.8s ease-out, opacity 0.5s;
    }

    .envelope.open {
      transform: translateY(-50px) scale(0.5);
      opacity: 0;
    }

    .invitation {
      display: none;
      opacity: 0;
      transition: opacity 1.5s ease-in;
    }

    .profile-img {
      width: 280px;
      height: 350px;
      object-fit: cover; 
      border-radius: 15px;
      border: 4px solid #ffffff;
      margin-bottom: 20px;
    }

    #timer-display {
      font-family: "Times New Roman", Times, serif;
      font-size: 2.2rem;
      margin: 20px 0;
      text-shadow: 0 0 15px rgba(255, 0, 0, 0.9);
    }

    .scroll-hint {
      font-size: 1.2rem;
      margin-top: 20px;
      color: #ffffff;
      opacity: 0.8;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
      40% {transform: translateY(-10px);}
      60% {transform: translateY(-5px);}
    }

    /* List Image Styling */
    .list-section {
      width: 100vw;
      background-color: transparent; /* Changed to transparent */
      text-align: center;
    }

    .divider-text {
      padding: 40px 0;
      font-size: 1.8rem;
      color: #ffffff;
      font-family: serif;
      /* Added Red Glow Outline */
      text-shadow: 0 0 10px #ff0000, 0 0 20px #ff0000;
    }

    .full-screen-img {
      width: 100vw;
      height: 100vh;
      display: block;
      object-fit: cover;
      border: none;
    }

    .see-you-there {
      width: 100vw;
      padding: 100px 0;
      background-color: transparent; /* Changed to transparent */
      font-size: 3.5rem;
      font-weight: bold;
      text-align: center;
      color: #ffffff;
      text-shadow: 0 0 20px #ff0000, 0 0 30px #8b0000;
    }

    .line {
      overflow: hidden;
      white-space: normal;
      width: 100%;
      margin: 12px auto;
      font-size: 1.5rem;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5); /* Helps text readability on image background */
    }

    h1.line { font-size: 2.5rem; }
  </style>
</head>

<body>
  <audio id="bg-music" loop>
    <source src="iseethelight.mp3" type="audio/mpeg">
  </audio>

  <div class="petals"></div>

  <div class="container">
    <div id="intro-section">
      <p class="invite-text" style="font-size: 2rem; animation: pulse 2s infinite;">You're invited! (Click the envelope)</p>
      <div class="envelope" id="envelope"></div>
    </div>

    <div id="invitation" class="invitation">
      <img src="dana-photo.png" alt="Dana" class="profile-img">
      <h1 class="line">Dana is turning 18!!</h1>
      <div id="timer-display">Loading...</div>

      <p class="line">We happily invite you to her party!</p>
      <p class="line">May 19, 2026, 5:00pm</p>
      <p class="line">at Florenceville Private Resort & Events Place <br> General Trias Cavite</p>
      
      <!-- SCROLL HINT -->
      <p class="scroll-hint">Scroll down ▼</p>
      
      <img src="location-venue.png" alt="Venue" style="width:100%; max-width:400px; border-radius:12px; margin-top:20px;">
    </div>
  </div>

  <!-- LIST SECTIONS WITH DIVIDERS -->
  <div id="extra-photos" style="display:none;">
    <div class="list-section">
      <div class="divider-text">⊹₊˚‧︵‿₊୨🌹୧₊‿︵‧˚₊⊹</div>
      <img src="18-roses.png" class="full-screen-img">
    </div>

    <div class="list-section">
      <div class="divider-text">⊹₊˚‧︵‿₊୨🌹୧₊‿︵‧˚₊⊹</div>
      <img src="18-treasures.png" class="full-screen-img">
    </div>

    <div class="list-section">
      <div class="divider-text">⊹₊˚‧︵‿₊୨🌹୧₊‿︵‧˚₊⊹</div>
      <img src="18-bluebills.png" class="full-screen-img">
    </div>

    <!-- CLOSING MESSAGE -->
    <div class="see-you-there">
      See you there~
    </div>
  </div>

  <script>
    const envelope = document.getElementById("envelope");
    const invitation = document.getElementById("invitation");
    const extraPhotos = document.getElementById("extra-photos");
    const music = document.getElementById("bg-music");

    document.addEventListener("click", () => {
      music.play().catch(e => {});
    }, { once: true });

    envelope.addEventListener("click", () => {
      envelope.classList.add("open");
      setTimeout(() => {
        document.getElementById("intro-section").style.display = "none";
        invitation.style.display = "block";
        extraPhotos.style.display = "block";
        setTimeout(() => { 
            invitation.style.opacity = "1";
            document.body.style.overflowY = "auto";
        }, 100);
      }, 600);
    });

    var countDownDate = new Date("May 19, 2026 17:00:00").getTime();
    setInterval(function() {
      var now = new Date().getTime();
      var distance = countDownDate - now;
      var days = Math.floor(distance / (1000 * 60 * 60 * 24));
      var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      var seconds = Math.floor((distance % (1000 * 60)) / 1000);
      document.getElementById("timer-display").innerHTML = days + "d " + hours + "h " + minutes + "m " + seconds + "s";
    }, 1000);
  </script>
</body>
</html>
